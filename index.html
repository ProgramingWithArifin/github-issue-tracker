<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker | Login</title>
    <!-- favicon setup -->
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <!-- font awsome setup  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- font setup  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- tailwind and daisyui setup  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- custom css setup  -->

</head>

<body class="bg-base-300">
    <section class="flex justify-center items-center flex-col gap-10 min-h-screen max-w-md bg-base-100 mx-auto my-4 py-4 rounded-2xl shadow-xl">
        <div id="alert" role="alert" class="alert mt-2 alert-error hidden">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 shrink-0 stroke-current" fill="none"
                viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            <span>Error! Enter a valid username and password.</span>
        </div>
        <div class="logo-container">
            <img class="w-full max-w-sm" src="./assets/github-logo.png" alt="">
        </div>
        <div class="title">
            <h2 class="text-2xl font-bold">GitHub Issues Tracker</h2>
            <p class="text-sm text-center text-gray-600">Sign in to manage your issues</p>
        </div>
        <fieldset class="fieldset bg-base-200 border-base-300 rounded-box w-xs border">
            <label class="label font-bold">Username</label>
            <input id="username" type="text" class="input" placeholder="Enter Username" />
            <span class="text-primary">Default:admin</span>
            <label class="label font-bold">Enter Password</label>
            <input id="password" type="password" class="input" placeholder="Password" />
            <span class="text-primary">Default:admin123</span>
            <button id="login-btn" class="btn btn-primary mt-4">Sign In</button>
        </fieldset>
        <div class="flex items-center justify-center flex-col space-y-2">
            <p class="text-gray-600">OR</p>
            <p class="text-gray-500">Demo Credentials:</p>
            <p><span class="font-bold">Username:</span> admin</p>
            <p><span class="font-bold">Password:</span> admin123</p>
        </div>
    </section>
    <script src="./script/login.js"></script>
</body>

</html>

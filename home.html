<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker | Home</title>
    <!-- favicon setup -->
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <!-- font awsome setup  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- font setup  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- tailwind and daisyui setup  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- custom css setup  -->

</head>

<body class="bg-base-200 min-h-screen">
    <header class="mb-4">
        <div class="navbar bg-base-100 shadow-sm flex-col sm:flex-row gap-3">
            <div class="flex-1">
                <a class="text-2xl w-auto flex items-center font-semibold gap-1.5"><img class="w-[36px]"
                        src="./assets/github-logo.png" alt=""><span>GitHub Issues Tracker</span></a>
            </div>
            <div class="flex gap-2">
                <label class="input">
                    <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                            stroke="currentColor">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.3-4.3"></path>
                        </g>
                    </svg>
                    <input id="searchInput" type="search" required placeholder="Search issues..." />
                </label>
                <button id="searchBtn" class="btn btn-primary">Search</button>
            </div>
        </div>
    </header>
    <main class=" w-11/12 max-md:w-11/12 mx-auto my-4 space-y-8">
        <section id="tab" class="my-6 bg-base-100 rounded-2xl shadow-sm p-4">
            <button id="all" onclick="toggleBtn('all')" class="btn btn-outline btn-primary">All</button>
            <button id="open" onclick="toggleBtn('open')" class="btn btn-outline btn-primary">Open</button>
            <button id="closed" onclick="toggleBtn('closed')" class="btn btn-outline btn-primary">Closed</button>
        </section>
        <section class="counter bg-base-100 rounded-2xl flex items-start sm:items-center justify-center sm:justify-between p-4 shadow-sm flex-col sm:flex-row gap-4">
            <div class="left flex justify-center items-center gap-3">
                <div class="icon"><img src="./assets/Aperture.png" alt=""></div>
                <div class="text">
                    <h2 class="text-xl font-semibold"><span id="counter">0</span> Issues</h2>
                    <p class="text-gray-600">Track and manage your project issues.</p>
                </div>
            </div>
            <div class="right flex gap-4">
                <div class="flex items-center gap-2">
                    <div class="w-3 h-3 rounded-full bg-green-600"></div>
                    <span>Open</span>
                </div>
                <div class="flex items-center gap-2">
                    <div class="w-3 h-3 rounded-full bg-violet-600"></div>
                    <span>Closed</span>
                </div>
            </div>
        </section>
        <div id="spinner" class="flex justify-center items-center py-10">
            <span class="loading loading-spinner loading-lg text-primary"></span>
        </div>
        <section id="card-container" class="bg-base-100 rounded-2xl shadow-sm p-2 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 ">
            
            </div>
        </section>
    </main>

    <script src="./script/home.js"></script>
</body>

</html>
